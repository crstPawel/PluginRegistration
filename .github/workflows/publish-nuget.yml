name: Publish NuGet Packages

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ARTIFACTS_DIR: ./artifacts

jobs:
  build-and-publish:
    name: Build & Publish NuGet
    permissions:
      contents: read
      id-token: write   

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore PluginRegistrationTool.slnx

      - name: Build (Release)
        run: dotnet build PluginRegistrationTool.slnx --no-restore -c Release

      - name: Run tests
        run: dotnet test PluginRegistrationTool.slnx --no-build -c Release --logger "console;verbosity=minimal"

      - name: Determine package version
        id: version
        shell: bash
        run: |
          # Odczytaj wersję z Directory.Build.props
          VER=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props | head -1 || true)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version from Directory.Build.props: $VER"       

      - name: Pack NuGet packages
        run: |
          PACK_VERSION="${{ steps.version.outputs.version }}"
          if [ -n "$PACK_VERSION" ]; then
            dotnet pack --no-build -c Release -o ${{ env.ARTIFACTS_DIR }} /p:Version="$PACK_VERSION" /p:ContinuousIntegrationBuild=true
          else
            dotnet pack --no-build -c Release -o ${{ env.ARTIFACTS_DIR }} /p:ContinuousIntegrationBuild=true
          fi

      - name: List generated packages
        run: ls -la ${{ env.ARTIFACTS_DIR }}/

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.ARTIFACTS_DIR }}/
          retention-days: 30

      - name: Get OIDC token for NuGet Trusted Publishing
        id: nuget-oidc
        with:
          user: psobczak
          

      - name: Publish to NuGet.org
        run: |
          echo "Pushing packages using OIDC token..."
          dotnet nuget push "${{ env.ARTIFACTS_DIR }}/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \

      - name: Publish summary
        run: |
          echo "✅ Pakiety NuGet zostały opublikowane na nuget.org" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Opublikowane pakiety:" >> $GITHUB_STEP_SUMMARY
          ls ${{ env.ARTIFACTS_DIR }}/*.nupkg 2>/dev/null | xargs -I {} basename {} | sed 's/^/- \`/' | sed 's/$/\`/' >> $GITHUB_STEP_SUMMARY || echo "- (brak plików)" >> $GITHUB_STEP_SUMMARY
