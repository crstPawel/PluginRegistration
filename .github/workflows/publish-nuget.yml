name: Publish NuGet Packages

# Publikuje pakiety NuGet (Attributes, Core, Tool) do NuGet Gallery (nuget.org)
#
# Używa **Trusted Publishing** (OIDC) — zalecane przez NuGet.org.
# Nie wymaga przechowywania długoterminowego API keya.
# Patrz: https://learn.microsoft.com/en-us/nuget/nuget-org/trusted-publishing
#
# Zachowanie:
# - Zawsze: build + test + pack + upload artifact (nuget-packages)
# - Publikacja na nuget.org TYLKO gdy:
#     • GitHub Release (published), LUB
#     • Ręczne uruchomienie (workflow_dispatch) z publish=true
#
# Wymagana konfiguracja po stronie NuGet.org:
# 1. Zaloguj się na https://www.nuget.org
# 2. Dla każdego pakietu (lub przez Publishing Policies):
#    - Przejdź do strony pakietu → "Manage" / "Trusted publishers"
#    - Dodaj Trusted Publisher: GitHub Actions
#    - Owner: crstPawel
#    - Repository: PluginRegistration
#    - (opcjonalnie) Environment lub konkretny workflow
# 3. Dla "policies-pending-full-activation" — aktywuj politykę na nuget.org
#
# Fallback: jeśli OIDC nie zadziała, możesz nadal użyć sekretu NUGET_API_KEY.
#
# Zalecane: Używaj triggera "release" lub ręcznego dispatch.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Opcjonalna wersja (nadpisuje wersję z Directory.Build.props). Zostaw puste, aby użyć wersji z props.'
        required: false
        type: string
      publish:
        description: 'Opublikuj pakiety na nuget.org'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ARTIFACTS_DIR: ./artifacts

jobs:
  build-and-publish:
    name: Build & Publish NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Wymagane dla NuGet Trusted Publishing (OIDC)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      - name: Run tests
        run: dotnet test --no-build -c Release --logger "console;verbosity=minimal"

      - name: Determine package version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "Version override from input: ${{ github.event.inputs.version }}"
          else
            # Odczytaj wersję z Directory.Build.props
            VER=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props | head -1 || true)
            echo "version=$VER" >> $GITHUB_OUTPUT
            echo "Version from Directory.Build.props: $VER"
          fi

      - name: Pack NuGet packages
        run: |
          PACK_VERSION="${{ steps.version.outputs.version }}"
          if [ -n "$PACK_VERSION" ]; then
            dotnet pack --no-build -c Release -o ${{ env.ARTIFACTS_DIR }} /p:Version="$PACK_VERSION" /p:ContinuousIntegrationBuild=true
          else
            dotnet pack --no-build -c Release -o ${{ env.ARTIFACTS_DIR }} /p:ContinuousIntegrationBuild=true
          fi

      - name: List generated packages
        run: ls -la ${{ env.ARTIFACTS_DIR }}/

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.ARTIFACTS_DIR }}/
          retention-days: 30

      - name: Get OIDC token for NuGet Trusted Publishing
        # Pobierz krótkotrwały token OIDC (audience = api.nuget.org)
        # https://learn.microsoft.com/en-us/nuget/nuget-org/trusted-publishing
        if: (github.event_name == 'release') || (github.event.inputs.publish == 'true')
        id: nuget-oidc
        run: |
          TOKEN=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api.nuget.org" | jq -r '.value' || echo "")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Publish to NuGet.org
        if: (github.event_name == 'release') || (github.event.inputs.publish == 'true')
        env:
          # Preferuj OIDC token z Trusted Publishing, fallback na stary sekret
          NUGET_API_KEY: ${{ steps.nuget-oidc.outputs.token || secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::warning::No OIDC token and no NUGET_API_KEY secret. Skipping publish to nuget.org."
            exit 0
          fi

          dotnet nuget push "${{ env.ARTIFACTS_DIR }}/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish summary
        if: (github.event_name == 'release') || (github.event.inputs.publish == 'true')
        env:
          NUGET_API_KEY: ${{ steps.nuget-oidc.outputs.token || secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "⚠️ Publish skipped (no OIDC token / API key)" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          echo "✅ Pakiety NuGet zostały opublikowane na nuget.org" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Opublikowane pakiety:" >> $GITHUB_STEP_SUMMARY
          ls ${{ env.ARTIFACTS_DIR }}/*.nupkg 2>/dev/null | xargs -I {} basename {} | sed 's/^/- \`/' | sed 's/$/\`/' >> $GITHUB_STEP_SUMMARY || echo "- (brak plików)" >> $GITHUB_STEP_SUMMARY
