name: Publish NuGet Packages

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  ARTIFACTS_DIR: ./artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Nadpisanie wersji pakietu (puste = wersja z Directory.Build.props)'
        required: false
        type: string
        default: ''
      project:
        description: 'Projekt do spakowania i wysłania na NuGet'
        required: true
        type: choice
        options:
          - all
          - PluginRegistration.Attributes
          - PluginRegistration.Core
          - PluginRegistration.Tool
        default: all

jobs:
  build-and-publish:
    name: Build & Publish NuGet
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve pack target
        id: target
        shell: bash
        run: |
          PROJECT="${{ inputs.project }}"
          case "$PROJECT" in
            all)
              echo "pack_target=PluginRegistrationTool.slnx" >> $GITHUB_OUTPUT
              ;;
            PluginRegistration.Attributes)
              echo "pack_target=src/PluginRegistration.Attributes/PluginRegistration.Attributes.csproj" >> $GITHUB_OUTPUT
              ;;
            PluginRegistration.Core)
              echo "pack_target=src/PluginRegistration.Core/PluginRegistration.Core.csproj" >> $GITHUB_OUTPUT
              ;;
            PluginRegistration.Tool)
              echo "pack_target=src/PluginRegistration.Tool/PluginRegistration.Tool.csproj" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "::error::Unknown project: $PROJECT"
              exit 1
              ;;
          esac
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "Pack target project: $PROJECT"

      - name: Restore
        run: dotnet restore PluginRegistrationTool.slnx

      - name: Build (Release)
        run: dotnet build PluginRegistrationTool.slnx --no-restore -c Release

      - name: Run tests
        run: dotnet test PluginRegistrationTool.slnx --no-build -c Release --logger "console;verbosity=minimal"

      - name: Determine package version
        id: version
        shell: bash
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VER="$INPUT_VERSION"
            echo "Using version override from workflow input: $VER"
          else
            VER=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props | head -1 || echo "")
            echo "Using version from Directory.Build.props: $VER"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Pack NuGet packages
        run: |
          PACK_VERSION="${{ steps.version.outputs.version }}"
          PACK_TARGET="${{ steps.target.outputs.pack_target }}"
          if [ -n "$PACK_VERSION" ]; then
            dotnet pack "$PACK_TARGET" --no-build -c Release -o ${{ env.ARTIFACTS_DIR }} \
              /p:Version="$PACK_VERSION" \
              /p:ContinuousIntegrationBuild=true
          else
            dotnet pack "$PACK_TARGET" --no-build -c Release -o ${{ env.ARTIFACTS_DIR }} \
              /p:ContinuousIntegrationBuild=true
          fi

      - name: List generated packages
        run: ls -la ${{ env.ARTIFACTS_DIR }}/

      - name: Upload packages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.ARTIFACTS_DIR }}/
          retention-days: 30

      # ==================== TRUSTED PUBLISHING ====================
      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: psobczak

      - name: Publish to NuGet.org
        run: |
          echo "Pushing packages to nuget.org..."
          dotnet nuget push "${{ env.ARTIFACTS_DIR }}/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Publish summary
        if: success()
        run: |
          echo "✅ Pakiety NuGet zostały pomyślnie opublikowane na nuget.org" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Projekt:** ${{ steps.target.outputs.project }}" >> $GITHUB_STEP_SUMMARY
          echo "**Wersja:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Data publikacji:** $(date)" >> $GITHUB_STEP_SUMMARY
