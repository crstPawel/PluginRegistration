name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore PluginRegistrationTool.slnx

      - name: Build (Release)
        run: dotnet build PluginRegistrationTool.slnx --no-restore -c Release

      - name: Run tests
        run: dotnet test PluginRegistrationTool.slnx --no-build -c Release --logger "console;verbosity=minimal"

      - name: Verify NuGet pack (PluginRegistration.Attributes)
        run: dotnet pack src/PluginRegistration.Attributes/PluginRegistration.Attributes.csproj --no-build -c Release -o ./artifacts

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/TestResults/
          retention-days: 7